<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Middagshjälpen – Barnvänliga vardagsmiddagar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Gratis veckoplan och barnvänliga vardagsmiddagar för familjer.">

<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:900px;margin:40px auto;padding:20px;background:#f8fafc}
h1{margin-bottom:5px}
.subtitle{color:#666;margin-bottom:25px}
input,select{padding:10px;width:100%;margin-bottom:15px;border:1px solid #ddd;border-radius:8px}
button{padding:12px 20px;border:none;border-radius:10px;cursor:pointer;margin-top:5px}
.primary{background:#111;color:white}
.secondary{background:#e5e7eb}
.card{margin-top:25px;padding:20px;border-radius:14px;background:white;box-shadow:0 4px 15px rgba(0,0,0,0.05)}
.meta{color:#666;font-size:14px}
a{text-decoration:none;color:#111}
.recipe-link{display:block;padding:8px 0}
.footer{text-align:center;margin-top:60px;color:#777;font-size:14px}
</style>
</head>
<body>

<h1>🍽️ Middagshjälpen</h1>
<p class="subtitle">Slipp planera – få barnvänliga middagar och fullständiga recept.</p>

<label>Max tid (min)</label>
<input type="number" id="maxTime" value="45">

<label>Max pris (kr per portion)</label>
<input type="number" id="maxPrice" value="60">

<button class="primary" onclick="generateMeal()">Slumpa middag</button>
<button class="secondary" onclick="generateWeek()">Skapa veckoplan</button>

<div id="result"></div>

<div class="footer">
<p>Stötta projektet ☕</p>
<a href="swish://payment?phone=46702683881&amount=20&message=Stöd till Middagshjälpen">
<button class="primary">💛 Swisha 20 kr</button>
</a>
</div>

<script>

const recipes=[
{
id:"kycklinggryta",
title:"Kycklinggryta med ris",
time:30,
price:35,
ingredients:["600g kyckling","2 dl grädde","1 paprika","1 gul lök","Ris"],
instructions:"1. Stek kyckling.\n2. Tillsätt paprika och lök.\n3. Häll på grädde och låt puttra 15 min.\n4. Servera med ris."
},
{
id:"tacos",
title:"Tacos",
time:20,
price:40,
ingredients:["400g köttfärs","Tacokrydda","Tortilla","Sallad","Tomat"],
instructions:"1. Stek köttfärs.\n2. Blanda med tacokrydda.\n3. Servera i tortilla med grönsaker."
},
{
id:"korvstroganoff",
title:"Korv Stroganoff",
time:25,
price:30,
ingredients:["Falukorv","2 dl grädde","1 msk tomatpuré","Ris"],
instructions:"1. Skär och stek korv.\n2. Tillsätt tomatpuré och grädde.\n3. Låt puttra 10 min.\n4. Servera med ris."
}
];

function getParams(){
const params=new URLSearchParams(window.location.search);
return params.get("recept");
}

function showRecipeById(id){
const recipe=recipes.find(r=>r.id===id);
if(!recipe)return;

document.title=recipe.title+" – Middagshjälpen";

document.getElementById("result").innerHTML=`
<div class="card">
<h2>${recipe.title}</h2>
<p class="meta">⏱ ${recipe.time} min | 💰 ${recipe.price} kr</p>

<h3>Ingredienser</h3>
<ul>${recipe.ingredients.map(i=>`<li>${i}</li>`).join("")}</ul>

<h3>Så lagar du</h3>
<p>${recipe.instructions.replace(/\n/g,"<br>")}</p>

<br>
<a href="https://www.mathem.se" target="_blank">
<button class="primary">🛒 Handla ingredienser online</button>
</a>

<br><br>
<a href="./">← Tillbaka</a>
</div>
`;
}

function generateMeal(){
const maxTime=parseInt(document.getElementById("maxTime").value);
const maxPrice=parseInt(document.getElementById("maxPrice").value);

const filtered=recipes.filter(r=>r.time<=maxTime && r.price<=maxPrice);

if(filtered.length===0){
document.getElementById("result").innerHTML="<p>Inga rätter matchar dina val.</p>";
return;
}

const random=filtered[Math.floor(Math.random()*filtered.length)];
window.history.pushState({}, "", "?recept="+random.id);
showRecipeById(random.id);
}

function generateWeek(){
let week=[...recipes].sort(()=>0.5-Math.random()).slice(0,3);

document.getElementById("result").innerHTML=`
<div class="card">
<h2>📅 Veckoplan</h2>
${week.map(r=>`<a class="recipe-link" href="?recept=${r.id}">• ${r.title}</a>`).join("")}
</div>
`;
}

const recipeFromUrl=getParams();
if(recipeFromUrl){
showRecipeById(recipeFromUrl);
}

</script>
</body>
</html>
