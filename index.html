<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Middagshjälpen – Veckoplan för familjer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Slipp fundera på vad ni ska äta. Få barnvänliga vardagsmiddagar på 2 sekunder.">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 750px;
      margin: 40px auto;
      padding: 20px;
      background: #f9fafb;
      color: #222;
    }

    h1 { margin-bottom: 5px; }
    .subtitle { color: #666; margin-bottom: 30px; }

    input {
      padding: 10px;
      width: 100%;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .primary { background: #111; color: white; }
    .secondary { background: #e5e7eb; }

    .card {
      margin-top: 25px;
      padding: 20px;
      border-radius: 14px;
      background: white;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .meta { color: #666; font-size: 14px; }

    .premium-box {
      margin-top: 40px;
      padding: 20px;
      border-radius: 14px;
      background: #111;
      color: white;
    }

    .footer {
      margin-top: 50px;
      text-align: center;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>
<body>

<h1>🍽️ Middagshjälpen</h1>
<p class="subtitle">Slipp planera middagar. Få barnvänliga vardagsrätter på 2 sekunder.</p>

<label>Max tid (min)</label>
<input type="number" id="maxTime" value="40">

<label>Max pris (kr per portion)</label>
<input type="number" id="maxPrice" value="50">

<button class="primary" onclick="generateMeal()">Slumpa middag</button>

<button class="secondary" onclick="generateWeek()">Skapa veckoplan (Premium)</button>

<div id="result"></div>

<div class="premium-box">
  <h3>⭐ Premium (kommer snart)</h3>
  <p>✔ Färdig veckoplan<br>
     ✔ Automatisk inköpslista<br>
     ✔ Allergifilter<br>
     ✔ Spara favoriter</p>
  <p>29 kr/månad</p>
</div>

<div class="footer">
  Gillar du tjänsten? Stötta projektet ☕ Swish: 123 456 78 90
</div>

<script>
const recipes = [
  { title:"Kycklinggryta", time:30, price:35, ingredients:["Kyckling","Grädde","Paprika","Ris"], instructions:"Stek kyckling. Tillsätt grädde och paprika. Servera med ris." },
  { title:"Tacos", time:20, price:40, ingredients:["Köttfärs","Tacokrydda","Tortilla"], instructions:"Stek köttfärs. Servera i tortilla." },
  { title:"Korv Stroganoff", time:25, price:30, ingredients:["Falukorv","Grädde","Tomatpuré"], instructions:"Stek korv. Tillsätt grädde och tomatpuré." },
  { title:"Spaghetti & köttfärssås", time:35, price:32, ingredients:["Köttfärs","Tomat","Spaghetti"], instructions:"Stek köttfärs. Låt puttra med tomat. Servera med spaghetti." },
  { title:"Kyckling i ugn", time:40, price:38, ingredients:["Kyckling","Potatis","Olja"], instructions:"Lägg allt i ugn 40 min." }
];

function generateMeal() {
  const maxTime = parseInt(document.getElementById("maxTime").value);
  const maxPrice = parseInt(document.getElementById("maxPrice").value);
  const filtered = recipes.filter(r => r.time <= maxTime && r.price <= maxPrice);

  if(filtered.length === 0){
    document.getElementById("result").innerHTML = "<p>Inga rätter matchar dina val.</p>";
    return;
  }

  const random = filtered[Math.floor(Math.random() * filtered.length)];

  document.getElementById("result").innerHTML = `
    <div class="card">
      <h2>${random.title}</h2>
      <p class="meta">⏱ ${random.time} min | 💰 ${random.price} kr</p>
      <h3>Ingredienser</h3>
      <ul>${random.ingredients.map(i => `<li>${i}</li>`).join("")}</ul>
      <p>${random.instructions}</p>
      <br>
      <a href="https://www.mathem.se" target="_blank">
        <button class="primary">🛒 Handla ingredienser online</button>
      </a>
    </div>
  `;
}

function generateWeek(){
  document.getElementById("result").innerHTML = `
    <div class="card">
      <h2>Veckoplan är Premium</h2>
      <p>Vill du slippa planera hela veckan?</p>
      <p>Premium lanseras snart för 29 kr/mån.</p>
    </div>
  `;
}
</script>

</body>
</html>
